# match key configuration AKA pool configuration
---
type: object
description: match key configuration AKA pool configuration
properties:
  id:
    type: string
    description: identifier
  matcher:
    type: string
    description: matcher module invocation moduleId<::function> (the ::function suffix is optional)
  args:
    type: string
    enum:
      - full
      - payload
    description: |
      how arguments are passed to matcher, "full": full record, "payload": only record payload; if omitted , "payload" is used
  cql:
    type: object
    description: |
      CQL query mapping from index name to module invocation string: moduleId<::function> (the ::function suffix is optional).
      For example: { "isbn": "module1::get_isbn", "issn": "module2::get_issn" }.
      A JSON object is passed to the matcher for each field and term in CQL. This object has property "term" with the term value,
      and property "index" with the index name. The function should return a list with exactly one string value,
      which is the result of transforming the input
  update:
    type: string
    enum:
      - ingest
      - manual
    description: |
      "ingest": update when records are ingested, "manual": update only when initialize is called
additionalProperties: false
required:
  - id
